<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SnapFIT Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
  <noscript><link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/></noscript>
  <style>
    :root {
      --navy:   #1C3557;
      --teal:   #2A8C8C;
      --orange: #E07B2A;
      --cream:  #F5F1E8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--navy);
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(42,140,140,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42,140,140,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -80px;
      right: -80px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 24px solid rgba(42,140,140,0.12);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.4rem;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeDown 0.8s ease both;
    }

    .logo-img {
      width: 220px;
      height: auto;
      filter: drop-shadow(0 4px 24px rgba(0,0,0,0.4));
    }

    .tagline {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.95rem;
      color: rgba(245,241,232,0.65);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      margin-top: 0.5rem;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--orange));
      border-radius: 2px;
      animation: fadeIn 1s 0.4s ease both;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(42,140,140,0.25);
      border-radius: 16px;
      padding: 2.4rem 2rem;
      width: 100%;
      backdrop-filter: blur(8px);
      animation: fadeUp 0.9s 0.3s ease both;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    .card h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--cream);
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
    }

    .card p {
      font-size: 0.88rem;
      color: rgba(245,241,232,0.55);
      margin-bottom: 1.6rem;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(42,140,140,0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      border-color: var(--teal);
      background: rgba(42,140,140,0.1);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .checkbox-group-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
      display: block;
      margin-bottom: 0.6rem;
    }

    .checkboxes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1rem;
      margin-bottom: 1.4rem;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .check-item input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(42,140,140,0.5);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: all 0.15s;
    }

    .check-item input[type="checkbox"]:checked {
      background: var(--teal);
      border-color: var(--teal);
    }

    .check-item input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: -2px;
      left: 2px;
      font-size: 11px;
      color: white;
      font-weight: 700;
    }

    .check-item span {
      font-size: 0.82rem;
      color: rgba(245,241,232,0.75);
      line-height: 1.3;
    }

    .btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--teal) 0%, var(--navy) 100%);
      border: 1px solid var(--teal);
      border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--orange), var(--teal));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn:hover::before { opacity: 1; }
    .btn span { position: relative; z-index: 1; }
    .btn:active { transform: scale(0.98); }

    .success {
      display: none;
      text-align: center;
      padding: 1.5rem;
    }

    .success .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .success h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      color: var(--teal);
      margin-bottom: 0.4rem;
    }

    .success p {
      font-size: 0.9rem;
      color: rgba(245,241,232,0.65);
      margin: 0;
    }

    footer {
      font-size: 0.75rem;
      color: rgba(245,241,232,0.25);
      text-align: center;
      letter-spacing: 0.06em;
      animation: fadeIn 1.2s 0.8s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 480px) {
      .checkboxes { grid-template-columns: 1fr; }
      .card { padding: 1.6rem 1.2rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="logo-wrap">
    <img src="https://raw.githubusercontent.com/rydprdfznp-gif/SNAPFIT-website/main/raw.png" alt="SnapFIT Solutions" class="logo-img" />
    <p class="tagline">Wellness Built for Women Who Build</p>
  </div>

  <div class="divider"></div>

  <div class="card">
    <h2>Get in Touch</h2>
    <p>Reach out and I'll respond within 3 business days.</p>

    <form id="contactForm" onsubmit="handleSubmit(event)">

      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="First & Last Name" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="message">What would be most helpful for you right now?</label>
        <textarea id="message" name="message" placeholder="Tell me a little about what you're looking for..."></textarea>
      </div>

      <div class="form-group">
        <span class="checkbox-group-label">What would you like help with?</span>
        <div class="checkboxes">
          <label class="check-item">
            <input type="checkbox" name="goals" value="Reducing pain" />
            <span>Reducing pain</span>
          </label>
          <label class="check-item">
            <input type="checkbox" name="goals" value="Recovery after long shifts" />
            <span>Recovery after long shifts</span>
          </label>
          <label class="check-item">
            <input type="checkbox" name="goals" value="Energy and fatigue" />
            <span>Energy & fatigue</span>
          </label>
          <label class="check-item">
            <input type="checkbox" name="goals" value="Nutrition" />
            <span>Nutrition</span>
          </label>
          <label class="check-item">
            <input type="checkbox" name="goals" value="Movement / exercise" />
            <span>Movement / exercise</span>
          </label>
          <label class="check-item">
            <input type="checkbox" name="goals" value="Injury prevention" />
            <span>Injury prevention</span>
          </label>
        </div>
      </div>

      <button type="submit" class="btn"><span>Send Message →</span></button>
    </form>

    <div class="success" id="successMsg">
      <div class="icon">✅</div>
      <h3>Message Received!</h3>
      <p>Thank you for reaching out. I'll reply within 3 business days.<br/>— Lauren, SnapFIT Solutions</p>
    </div>

  </div>

  <footer>© 2026 SnapFIT Solutions · info@snapfitsolution.com</footer>

</div>

<script>
  async function handleSubmit(e) {
    e.preventDefault();

    const form    = document.getElementById('contactForm');
    const btn     = form.querySelector('.btn');
    const success = document.getElementById('successMsg');

    btn.disabled = true;
    btn.querySelector('span').textContent = 'Sending…';

    try {
      const response = await fetch('https://formspree.io/f/xlgagagn', {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        form.style.display = 'none';
        success.style.display = 'block';
      } else {
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Send Message →';
        alert('Something went wrong. Please try again or email info@snapfitsolution.com directly.');
      }
    } catch (err) {
      btn.disabled = false;
      btn.querySelector('span').textContent = 'Send Message →';
      alert('Network error. Please check your connection and try again.');
    }
  }
</script>

</body>
</html>
