<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You · SnapFIT Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --navy: #1C3557; --teal: #2A8C8C; --orange: #E07B2A; --cream: #F5F1E8; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--navy);
      font-family: 'Lato', sans-serif;
      color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(42,140,140,0.25);
      border-radius: 16px;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem;
      color: var(--teal);
      margin-bottom: 0.75rem;
      letter-spacing: 0.06em;
    }
    p {
      font-size: 0.95rem;
      color: rgba(245,241,232,0.7);
      line-height: 1.7;
      margin-bottom: 0.5rem;
    }
    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--orange));
      border-radius: 2px;
      margin: 1.5rem auto;
    }
    .sig {
      font-size: 0.85rem;
      color: rgba(245,241,232,0.4);
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Message Received!</h1>
    <div class="divider"></div>
    <p>Thank you for reaching out. I'm genuinely glad you did.</p>
    <p>I'll be in touch personally within <strong>3 business days.</strong></p>
    <p class="sig">— Lauren · SnapFIT Solutions<br/>info@snapfitsolution.com</p>
  </div>
</body>
</html>
